<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>WKWebView Share Test</title>
  <style>
    :root {
      --bg1:#070B14;
      --bg2:#0C1630;
      --card:#121A2B;
      --text:#EAF0FF;
      --sub:#A8B2CC;
      --btn1:#7C5CFF;
      --btn2:#23D5FF;
      --shadow: rgba(0,0,0,0.42);
    }
    body{
      margin:0;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background:radial-gradient(1000px 700px at 20% 10%, var(--bg2), var(--bg1));
      font-family:-apple-system, BlinkMacSystemFont, "SF Pro Display", "Apple SD Gothic Neo", sans-serif;
      color:var(--text);
    }
    .wrap{
      display:flex;
      flex-direction:column;
      gap:16px;
      align-items:center;
    }
    .btn{
      border:0;
      cursor:pointer;
      padding:16px 20px;
      border-radius:16px;
      font-size:17px;
      font-weight:800;
      color:#fff;
      background:linear-gradient(90deg, var(--btn1), var(--btn2));
      box-shadow:0 12px 26px rgba(124,92,255,0.28);
      transition:transform .08s ease, filter .08s ease;
      -webkit-tap-highlight-color: transparent;
      min-width:220px;
    }
    .btn:active{ transform:scale(0.98); filter:saturate(1.1); }

    .preview{
      width:180px;
      height:180px;
      border-radius:20px;
      border:1px solid rgba(255,255,255,0.12);
      box-shadow:0 12px 26px rgba(0,0,0,0.28);
      overflow:hidden;
      background:#111a2b;
    }
    .preview img{
      width:100%;
      height:100%;
      display:block;
      object-fit:cover;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="preview">
      <img id="previewImage" alt="preview" />
    </div>

    <button id="shareTextBtn" class="btn">텍스트 공유하기</button>
    <button id="shareImageBtn" class="btn">이미지 공유하기</button>
  </div>

  <script>
    function makeSampleBase64Image() {
      const canvas = document.createElement("canvas");
      canvas.width = 360;
      canvas.height = 360;

      const ctx = canvas.getContext("2d");
      if (!ctx) {
        throw new Error("canvas context 생성 실패");
      }

      const gradient = ctx.createLinearGradient(0, 0, 360, 360);
      gradient.addColorStop(0, "#7C5CFF");
      gradient.addColorStop(1, "#23D5FF");
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, 360, 360);

      ctx.fillStyle = "rgba(255,255,255,0.92)";
      ctx.beginPath();
      ctx.arc(180, 120, 56, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillRect(95, 205, 170, 28);

      ctx.fillStyle = "#0C1630";
      ctx.font = "bold 28px sans-serif";
      ctx.textAlign = "center";
      ctx.fillText("SHARE", 180, 305);

      return canvas.toDataURL("image/png");
    }

    async function shareText() {
      try {
        await navigator.share({
          title: "텍스트 공유",
          text: "안녕하세요. WKWebView 안에서 Web Share API로 텍스트를 공유합니다."
        });
      } catch (e) {
        console.log("텍스트 공유 취소 또는 실패", e);
      }
    }

    async function shareImage(base64DataUrl) {
      if (!navigator.share) {
        alert("이 브라우저는 웹 공유를 지원하지 않습니다.");
        return;
      }

      try {
        const [meta, base64] = base64DataUrl.split(",");
        if (!meta || !base64) {
          throw new Error("잘못된 base64 데이터입니다.");
        }

        const mimeMatch = meta.match(/data:(.*?);base64/);
        const mimeType = mimeMatch ? mimeMatch[1] : "image/png";

        const binary = atob(base64);
        const bytes = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i++) {
          bytes[i] = binary.charCodeAt(i);
        }

        const extension = mimeType === "image/jpeg" ? "jpg" : "png";
        const file = new File(
          [new Blob([bytes], { type: mimeType })],
          `shared-image.${extension}`,
          { type: mimeType }
        );

        if (navigator.canShare && !navigator.canShare({ files: [file] })) {
          alert("이 환경은 이미지 파일 공유를 지원하지 않습니다.");
          return;
        }

        await navigator.share({
          title: "이미지 공유",
          text: "간단한 샘플 이미지를 공유합니다.",
          files: [file]
        });
      } catch (e) {
        console.log("이미지 공유 취소 또는 실패", e);
      }
    }

    const sampleImage = makeSampleBase64Image();
    document.getElementById("previewImage").src = sampleImage;

    document.getElementById("shareTextBtn").addEventListener("click", async () => {
      await shareText();
    });

    document.getElementById("shareImageBtn").addEventListener("click", async () => {
      await shareImage(sampleImage);
    });
  </script>
</body>
</html>
